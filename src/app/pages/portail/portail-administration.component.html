<div class="space-y-6"><div><p class="text-sm font-medium text-brand-500">Administration</p><h1 class="text-2xl font-semibold text-gray-900 dark:text-white">Accès au portail familles</h1><p class="text-sm text-gray-500">Rattachez un compte parent ou élève à son dossier scolaire.</p></div>
<div class="rounded-2xl border bg-white p-5 dark:bg-gray-900"><h2 class="font-semibold">Nouveau rattachement</h2><div class="mt-4 grid gap-4 md:grid-cols-[1fr_1fr_auto]"><label class="text-sm">Élève<app-select [(ngModel)]="eleveUuid" [options]="eleveOptions" [searchFn]="rechercherEleves" placeholder="Sélectionner" className="mt-1" /></label><label class="text-sm">Compte portail<app-select [(ngModel)]="utilisateurUuid" [options]="utilisateurOptions" [searchFn]="rechercherUtilisateurs" placeholder="Sélectionner" className="mt-1" /></label><button (click)="rattacher()" [disabled]="!eleveUuid||!utilisateurUuid" class="self-end rounded-lg bg-brand-500 px-4 py-3 text-sm text-white disabled:opacity-40">Rattacher</button></div></div>
<div class="overflow-x-auto rounded-2xl border bg-white dark:bg-gray-900"><table class="w-full text-left text-sm"><thead class="bg-gray-50 text-xs uppercase text-gray-500"><tr><th class="p-4">Élève</th><th class="p-4">Compte</th><th class="p-4">Profil</th><th class="p-4">État</th><th class="p-4"></th></tr></thead><tbody><tr *ngFor="let r of rattachements | paginate:page:pageSize" class="border-t"><td class="p-4"><b>{{r.eleve}}</b><br><span class="text-xs text-gray-500">{{r.elv_code}}</span></td><td class="p-4">{{r.utilisateur}}<br><span class="text-xs text-gray-500">{{r.util_mail}}</span></td><td class="p-4">{{r.profil}}</td><td class="p-4"><span class="rounded-full px-2 py-1 text-xs" [class.bg-success-50]="r.pec_actif" [class.bg-gray-100]="!r.pec_actif">{{r.pec_actif?'Actif':'Inactif'}}</span></td><td class="p-4"><button (click)="changerEtat(r)" class="text-brand-600">{{r.pec_actif?'Désactiver':'Réactiver'}}</button></td></tr></tbody></table><p *ngIf="!chargement&&!rattachements.length" class="p-6 text-center text-sm text-gray-500">Aucun rattachement.</p><app-pagination class="m-4 block" [currentPage]="page" [totalPages]="totalPages" [totalItems]="rattachements.length" [pageSize]="pageSize" itemLabel="rattachement" (pageChange)="changerPage($event)" (pageSizeChange)="changerTaille($event)"/></div></div>

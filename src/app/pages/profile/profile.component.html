<app-page-breadcrumb pageTitle="Mon profil" />
<div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] lg:p-6">
  <h3 class="mb-5 text-lg font-semibold text-gray-800 dark:text-white/90 lg:mb-7">
    Mon profil
  </h3>

  @if (loading) {
    <div class="rounded-xl bg-gray-50 px-5 py-10 text-center text-sm text-gray-500 dark:bg-white/[0.03]">
      Chargement de votre profil…
    </div>
  } @else if (loadError) {
    <div class="rounded-xl border border-error-200 bg-error-50 p-5 text-sm text-error-600 dark:border-error-500/20 dark:bg-error-500/10 dark:text-error-400">
      <p>{{ loadError }}</p>
      <button type="button" class="mt-3 font-medium underline" (click)="charger()">Réessayer</button>
    </div>
  } @else {
    <div class="space-y-6">
      <app-user-meta-card [profile]="profile" />
      <app-user-info-card
        [profile]="profile"
        [saving]="saving"
        (save)="enregistrer($event)"
      />
    </div>
  }
</div>

<div class="relative flex">
  <!-- Dropdown position: Start -->
  @if (selectPosition === 'start') {
    <div class="absolute z-20 w-32">
      <app-select [ngModel]="selectedCountry" [options]="countryOptions" (ngModelChange)="handleCountryChange($event)" className="rounded-r-none border-0 border-r" />
    </div>
  }

  <!-- Input field -->
  <input type="tel" [placeholder]="placeholder"
    [ngClass]="selectPosition === 'start' ? 'pl-[84px]' : 'pr-[84px]'"
    class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent py-3 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800" />

  <!-- Dropdown position: End -->
  @if (selectPosition === 'end') {
    <div class="absolute right-0 z-20 w-32">
      <app-select [ngModel]="selectedCountry" [options]="countryOptions" (ngModelChange)="handleCountryChange($event)" className="rounded-l-none border-0 border-l" />
    </div>
  }
</div>

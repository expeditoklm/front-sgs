<app-modal [isOpen]="isOpen" (close)="cancelled.emit()" className="max-w-[480px] p-5 lg:p-8">
  <h4 class="font-semibold text-gray-800 mb-3 text-title-sm dark:text-white/90">
    {{ title }}
  </h4>
  <p class="text-sm leading-6 text-gray-500 dark:text-gray-400">
    {{ message }}
  </p>

  @if (errorMessage) {
    <p class="mt-3 text-sm text-error-500">{{ errorMessage }}</p>
  }

  <div class="flex items-center justify-end w-full gap-3 mt-8">
    <app-button size="sm" variant="outline" (btnClick)="cancelled.emit()">
      Annuler
    </app-button>
    <app-button size="sm" [disabled]="confirming" (btnClick)="confirmed.emit()">
      Confirmer
    </app-button>
  </div>
</app-modal>

<div class="relative">
  <button
    type="button"
    aria-label="Ouvrir les notifications"
    class="relative flex h-11 w-11 items-center justify-center rounded-full border border-gray-200 bg-white text-gray-500 transition-colors dropdown-toggle hover:bg-gray-100 hover:text-gray-700 dark:border-gray-800 dark:bg-gray-900 dark:text-gray-400 dark:hover:bg-gray-800 dark:hover:text-white"
    (click)="toggleDropdown()"
  >
    @if (total > 0) {
      <span class="absolute -right-1 -top-1 z-10 flex min-h-5 min-w-5 items-center justify-center rounded-full bg-error-500 px-1 text-[10px] font-semibold text-white">
        {{ badge }}
        @if (shouldAnimate) {
          <span class="absolute inset-0 rounded-full bg-error-400 opacity-60 animate-ping"></span>
        }
      </span>
    }
    <svg class="fill-current" width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
      <path fill-rule="evenodd" clip-rule="evenodd" d="M10.75 2.29248C10.75 1.87827 10.4143 1.54248 10 1.54248C9.58583 1.54248 9.25004 1.87827 9.25004 2.29248V2.83613C6.08266 3.20733 3.62504 5.9004 3.62504 9.16748V14.4591H3.33337C2.91916 14.4591 2.58337 14.7949 2.58337 15.2091C2.58337 15.6234 2.91916 15.9591 3.33337 15.9591H16.6667C17.0809 15.9591 17.4167 15.6234 17.4167 15.2091C17.4167 14.7949 17.0809 14.4591 16.6667 14.4591H16.375V9.16748C16.375 5.9004 13.9174 3.20733 10.75 2.83613V2.29248ZM14.875 14.4591V9.16748C14.875 6.47509 12.6924 4.29248 10 4.29248C7.30765 4.29248 5.12504 6.47509 5.12504 9.16748V14.4591H14.875ZM8.00004 17.7085C8.00004 18.1228 8.33583 18.4585 8.75004 18.4585H11.25C11.6643 18.4585 12 18.1228 12 17.7085C12 17.2943 11.6643 16.9585 11.25 16.9585H8.75004C8.33583 16.9585 8.00004 17.2943 8.00004 17.7085Z"/>
    </svg>
  </button>

  <app-dropdown
    [isOpen]="isOpen"
    (close)="closeDropdown()"
    className="absolute -right-[240px] mt-[17px] flex max-h-[480px] w-[350px] flex-col rounded-2xl border border-gray-200 bg-white p-3 shadow-theme-lg dark:border-gray-800 dark:bg-gray-dark sm:w-[380px] lg:right-0"
  >
    <div class="mb-3 flex items-center justify-between border-b border-gray-100 pb-3 dark:border-gray-700">
      <div>
        <h5 class="text-lg font-semibold text-gray-800 dark:text-gray-200">À traiter</h5>
        <p class="text-xs text-gray-500 dark:text-gray-400">Actions en attente selon votre rôle</p>
      </div>
      <button
        type="button"
        data-confirm-skip="true"
        (click)="charger()"
        class="rounded-lg px-3 py-2 text-xs font-medium text-brand-600 hover:bg-brand-50 dark:text-brand-300 dark:hover:bg-brand-500/10"
      >
        Actualiser
      </button>
    </div>

    @if (loading) {
      <div class="px-4 py-10 text-center text-sm text-gray-500 dark:text-gray-400">
        Chargement…
      </div>
    } @else if (!notifications.length) {
      <div class="px-5 py-10 text-center">
        <div class="mx-auto mb-3 flex h-11 w-11 items-center justify-center rounded-full bg-success-50 text-success-600 dark:bg-success-500/10 dark:text-success-400">
          ✓
        </div>
        <p class="font-medium text-gray-700 dark:text-gray-300">Aucune action en attente</p>
        <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">
          La cloche s’activera lorsqu’un élément nécessitera votre intervention.
        </p>
      </div>
    } @else {
      <ul class="flex flex-col overflow-y-auto custom-scrollbar">
        @for (notification of notifications; track notification.id) {
          <li>
            <button
              type="button"
              (click)="ouvrir(notification)"
              class="flex w-full gap-3 rounded-lg border-b border-gray-100 px-4 py-3 text-left hover:bg-gray-50 dark:border-gray-800 dark:hover:bg-white/5"
            >
              <span
                class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full text-sm font-semibold"
                [ngClass]="notification.tone === 'warning'
                  ? 'bg-warning-50 text-warning-700 dark:bg-warning-500/10 dark:text-warning-400'
                  : 'bg-brand-50 text-brand-700 dark:bg-brand-500/10 dark:text-brand-300'"
              >
                {{ notification.count }}
              </span>
              <span class="min-w-0">
                <span class="block font-medium text-gray-800 dark:text-white/90">{{ notification.title }}</span>
                <span class="mt-1 block text-xs leading-5 text-gray-500 dark:text-gray-400">
                  {{ notification.description }}
                </span>
              </span>
            </button>
          </li>
        }
      </ul>
    }
  </app-dropdown>
</div>

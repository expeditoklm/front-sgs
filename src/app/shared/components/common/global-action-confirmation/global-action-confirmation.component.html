@if (confirmations.request(); as request) {
  <app-modal
    [isOpen]="true"
    [showCloseButton]="false"
    (close)="confirmations.answer(false)"
    className="max-w-[500px] p-6 lg:p-8"
  >
    <div data-confirm-skip="true">
      <div
        class="mb-5 flex h-12 w-12 items-center justify-center rounded-full"
        [class.bg-error-50]="request.tone === 'danger'"
        [class.text-error-600]="request.tone === 'danger'"
        [class.bg-brand-50]="request.tone !== 'danger'"
        [class.text-brand-600]="request.tone !== 'danger'"
      >
        <span class="text-xl font-bold">!</span>
      </div>

      <h4 class="text-title-sm font-semibold text-gray-800 dark:text-white/90">{{ request.title }}</h4>
      <p class="mt-3 text-sm leading-6 text-gray-500 dark:text-gray-400">{{ request.message }}</p>

      <div class="mt-8 flex justify-end gap-3">
        <app-button size="sm" variant="outline" (btnClick)="confirmations.answer(false)">Annuler</app-button>
        <app-button
          size="sm"
          [className]="request.tone === 'danger' ? 'bg-error-500 hover:bg-error-600' : ''"
          (btnClick)="confirmations.answer(true)"
        >
          {{ request.confirmLabel }}
        </app-button>
      </div>
    </div>
  </app-modal>
}

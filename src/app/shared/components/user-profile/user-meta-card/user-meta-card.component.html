<div class="p-5 border border-gray-200 rounded-2xl dark:border-gray-800 lg:p-6">
  <div class="flex flex-col gap-5 xl:flex-row xl:items-center xl:justify-between">
    <div class="flex flex-col items-center w-full gap-5 sm:flex-row">
      <div
        class="flex h-20 w-20 shrink-0 items-center justify-center rounded-full bg-brand-50 text-2xl font-semibold text-brand-600 ring-1 ring-brand-100 dark:bg-brand-500/15 dark:text-brand-300 dark:ring-brand-500/20"
        aria-hidden="true"
      >
        {{ initials }}
      </div>

      <div class="text-center sm:text-left">
        <h4 class="mb-1 text-xl font-semibold text-gray-800 dark:text-white/90">
          {{ profile?.firstName }} {{ profile?.lastName }}
        </h4>
        <div class="flex flex-wrap items-center justify-center gap-2 text-sm text-gray-500 dark:text-gray-400 sm:justify-start">
          <span class="rounded-full bg-brand-50 px-2.5 py-1 font-medium text-brand-700 dark:bg-brand-500/15 dark:text-brand-300">
            {{ profile?.profilLibelle || profile?.profilCode }}
          </span>
          <span aria-hidden="true">•</span>
          <span>{{ profile?.username }}</span>
        </div>
        <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">{{ profile?.email }}</p>
      </div>
    </div>

    <div class="rounded-xl bg-gray-50 px-4 py-3 text-sm dark:bg-white/[0.03]">
      <p class="text-xs font-medium uppercase tracking-wide text-gray-400">Compte SGS</p>
      <p class="mt-1 font-medium" [class.text-success-600]="profile?.actif" [class.text-error-600]="!profile?.actif">
        {{ profile?.actif ? 'Actif' : 'Inactif' }}
      </p>
    </div>
  </div>
</div>

<div class="pointer-events-none fixed left-4 right-4 top-4 z-99999 flex flex-col items-end gap-3 sm:left-auto sm:right-5 sm:top-5 sm:w-full sm:max-w-sm">
  @for (toast of toastService.toasts(); track toast.id) {
    <div class="pointer-events-auto relative w-full shadow-theme-lg">
      <button
        type="button"
        (click)="toastService.dismiss(toast.id)"
        class="absolute right-2 top-2 z-10 flex h-6 w-6 items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 hover:text-gray-700 dark:hover:bg-white/10 dark:hover:text-white"
        aria-label="Fermer"
      >
        ×
      </button>
      <app-alert [variant]="toast.variant" [title]="toast.title" [message]="toast.message" />
    </div>
  }
</div>

<app-modal
  [isOpen]="!!document"
  (close)="close()"
  className="mx-3 max-w-6xl overflow-hidden p-0 sm:mx-6"
>
  @if (document) {
    <!-- app-modal ajoute un conteneur autour du ng-content : la hauteur et le layout flex doivent
         donc être portés ici pour que l'aperçu ne puisse jamais pousser les actions hors écran. -->
    <div class="flex h-[92vh] h-[92dvh] max-h-[calc(100vh-1.5rem)] min-h-0 flex-col overflow-hidden">
      <header class="shrink-0 border-b border-gray-200 px-5 py-4 pr-16 dark:border-gray-800 sm:px-7">
        <p class="text-xs font-medium uppercase tracking-wide text-brand-500">Aperçu du document</p>
        <h3 class="mt-1 truncate text-lg font-semibold text-gray-900 dark:text-white">{{ document.title }}</h3>
        <p class="truncate text-sm text-gray-500 dark:text-gray-400">{{ document.fileName }}</p>
      </header>

      <main class="min-h-0 flex-1 overflow-hidden bg-gray-100 p-3 dark:bg-gray-950 sm:p-5">
        @if (isPdf && safeUrl) {
          <iframe
            class="h-full w-full rounded-xl border border-gray-200 bg-white shadow-sm dark:border-gray-800"
            [src]="safeUrl"
            [title]="document.title"
          ></iframe>
        } @else if (isImage) {
          <div class="flex h-full min-h-0 items-center justify-center overflow-auto rounded-xl bg-white p-4 dark:bg-gray-900">
            <img [src]="objectUrl" [alt]="document.title" class="block h-auto w-auto max-h-full max-w-full object-contain" />
          </div>
        } @else {
          <div class="flex h-full flex-col items-center justify-center rounded-xl border border-dashed border-gray-300 bg-white p-8 text-center dark:border-gray-700 dark:bg-gray-900">
            <p class="font-medium text-gray-800 dark:text-white">Aperçu indisponible pour ce format</p>
            <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">Vous pouvez néanmoins enregistrer le fichier.</p>
          </div>
        }
      </main>

      <footer class="z-10 flex shrink-0 flex-wrap items-center justify-end gap-3 border-t border-gray-200 bg-white px-5 py-4 dark:border-gray-800 dark:bg-gray-900 sm:px-7">
        <app-button size="sm" variant="outline" (btnClick)="close()">Fermer</app-button>
        <app-button size="sm" variant="outline" [confirmationHandled]="true" (btnClick)="save()">Enregistrer</app-button>
        <app-button size="sm" [disabled]="!isPdf && !isImage" (btnClick)="print()">Imprimer</app-button>
      </footer>
    </div>
  }
</app-modal>

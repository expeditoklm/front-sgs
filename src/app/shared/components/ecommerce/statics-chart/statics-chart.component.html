<div
  class="rounded-2xl border border-gray-200 bg-white px-5 pb-5 pt-5 dark:border-gray-800 dark:bg-white/[0.03] sm:px-6 sm:pt-6">
  <div class="flex flex-col gap-5 mb-6 sm:flex-row sm:justify-between">
    <div class="w-full">
      <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90">
        Effectifs et capacités par classe
      </h3>
      <p class="mt-1 text-gray-500 text-theme-sm dark:text-gray-400">
        Lecture rapide des classes sous-occupées ou proches de leur capacité maximale
      </p>
    </div>
    <div class="flex items-start w-full gap-3 sm:justify-end">
      <span class="rounded-lg border border-gray-200 bg-white px-4 py-2.5 text-theme-sm font-medium text-gray-600 shadow-theme-xs dark:border-gray-700 dark:bg-gray-800 dark:text-gray-400">
        Toutes les classes
      </span>
    </div>
  </div>

  <div class="max-w-full overflow-x-auto custom-scrollbar">
    <div class="min-w-[1000px] xl:min-w-full">
      <apx-chart [series]="series" [chart]="chart" [colors]="colors" [stroke]="stroke" [fill]="fill" [markers]="markers"
        [grid]="grid" [dataLabels]="dataLabels" [tooltip]="tooltip" [xaxis]="xaxis" [yaxis]="yaxis"
        [legend]="legend"></apx-chart>
    </div>
  </div>
</div>

# Remplace /etc/nginx/conf.d/default.conf - inclus dans le http{} du nginx.conf de base de
# l'image officielle nginx:alpine.
server {
    # Port non privilégié : permet de faire tourner tout le process nginx (master compris)
    # sous l'utilisateur non-root "nginx" (cf. Dockerfile), pas seulement les workers.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Angular gère son propre routing côté client (Router) - toute route inconnue du serveur
    # doit retomber sur index.html, pas un 404 nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # environment.prod.ts pointe apiUrl vers "/api" : nginx relaie vers la gateway, qui route
    # elle-même vers les microservices (référentiels, authentication, ...). Le nom "service-gateway"
    # est le nom du service dans docker-compose - à adapter si le nom du service diffère.
    location /api/ {
        proxy_pass http://service-gateway:58080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Métriques HTTP de base (requêtes actives, connexions) pour nginx-prometheus-exporter
    # (sidecar, cf. k8s/frontend.yaml) - jamais exposé via l'Ingress, seulement en local au pod.
    location /stub_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Fichiers hashés par le build Angular (ex. main.a1b2c3.js) - mise en cache longue durée sûre.
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
